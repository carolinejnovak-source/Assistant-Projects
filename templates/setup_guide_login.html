<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Setup Guide — Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <style>
    body { background: #f8fafc; min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Inter', system-ui, sans-serif; }
    .login-card { background: #fff; border-radius: 16px; padding: 2.5rem 2rem; box-shadow: 0 4px 24px rgba(0,0,0,.08); width: 100%; max-width: 380px; }
    .login-card h2 { font-size: 1.4rem; font-weight: 700; color: #0f172a; margin-bottom: .25rem; }
    .login-card p.sub { font-size: .88rem; color: #64748b; margin-bottom: 1.5rem; }
    .form-label { font-weight: 600; font-size: .85rem; color: #374151; }
    .btn-primary { background: #2563eb; border: none; border-radius: 8px; font-weight: 600; padding: .6rem 1.2rem; }
    .btn-primary:hover { background: #1d4ed8; }
    .alert-danger { font-size: .85rem; border-radius: 8px; }
  </style>
</head>
<body>
  <div class="login-card">
    <h2>🔒 Setup Guide</h2>
    <p class="sub">Sign in to access the OpenClaw AI Assistant Setup Guide.</p>
    {% if error %}
    <div class="alert alert-danger">{{ error }}</div>
    {% endif %}
    <form method="post">
      <div class="mb-3">
        <label class="form-label" for="username">Username</label>
        <input type="text" class="form-control" id="username" name="username" autocomplete="username" required autofocus>
      </div>
      <div class="mb-3">
        <label class="form-label" for="password">Password</label>
        <input type="password" class="form-control" id="password" name="password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn btn-primary w-100 mt-1">Sign In</button>
    </form>
  </div>
</body>
</html>
